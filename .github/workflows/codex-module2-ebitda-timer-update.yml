name: Apply Codex module 2 EBITDA and timer update

on:
  push:
    branches:
      - codex/module2-ebitda-timer-update

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/module2-ebitda-timer-update

      - name: Patch HTML files
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(source, old, new, label):
              if old in source:
                  return source.replace(old, new, 1)
              old_crlf = old.replace('\n', '\r\n')
              new_crlf = new.replace('\n', '\r\n')
              if old_crlf in source:
                  return source.replace(old_crlf, new_crlf, 1)
              raise SystemExit(f'Missing expected block: {label}')

          def patch_index():
              path = Path('index.html')
              text = path.read_text(encoding='utf-8')

              text = replace_once(text, '<span id="tmr" onclick="startT()" title="Click: Start timer">90:00</span>', '<span id="tmr" onclick="startT()" title="Click: Start timer">60:00</span>', 'timer display')
              text = replace_once(text, 'Sell-side valuation · welding technology / mechanical engineering · 90 minutes', 'Sell-side valuation · welding technology / mechanical engineering · 60 minutes', 'intro duration')

              old_timeline = '''        <tr><td>1</td><td>Company Profile</td><td class="nr">8</td></tr>
        <tr><td>2</td><td>EBITDA Bridge &amp; NWC</td><td class="nr">18</td></tr>
        <tr><td>3</td><td>Trading Comps – Peer Selection</td><td class="nr">18</td></tr>
        <tr><td>4</td><td>Transaction Comps – 10+ Deals</td><td class="nr">20</td></tr>
        <tr><td>5</td><td>Equity Bridge &amp; Sensitivity</td><td class="nr">12</td></tr>
        <tr><td>6</td><td>Result &amp; Discussion</td><td class="nr">14</td></tr>
        <tr class="hl"><td></td><td>Total</td><td class="nr">90</td></tr>'''
              new_timeline = '''        <tr><td>1</td><td>Company Profile</td><td class="nr">5</td></tr>
        <tr><td>2</td><td>EBITDA Bridge &amp; NWC</td><td class="nr">14</td></tr>
        <tr><td>3</td><td>Trading Comps – Peer Selection</td><td class="nr">12</td></tr>
        <tr><td>4</td><td>Transaction Comps – 10+ Deals</td><td class="nr">13</td></tr>
        <tr><td>5</td><td>Equity Bridge &amp; Sensitivity</td><td class="nr">8</td></tr>
        <tr><td>6</td><td>Result &amp; Discussion</td><td class="nr">8</td></tr>
        <tr class="hl"><td></td><td>Total</td><td class="nr">60</td></tr>'''
              text = replace_once(text, old_timeline, new_timeline, 'timeline')

              old_erp_row = '''          <tr>
            <td>Expense for implementation of a new ERP module (SAP S/4HANA)</td>
            <td>Project costs for system integration and external consultants expensed in FY 2022: <b>EUR k 192</b>. Project is completed. Recurring maintenance expense is significantly lower and already budgeted.</td>
            <td class="nr"><input class="cinp" id="a7" type="number" step="10"></td>
          </tr>'''
              new_erp_row = '''          <tr>
            <td>Expense for implementation of a new ERP module (SAP S/4HANA)</td>
            <td>Project costs for system integration and external consultants expensed in FY 2022: <b>EUR k 192</b>. Project is completed. Recurring maintenance expense is significantly lower and already budgeted.</td>
            <td class="nr"><input class="cinp" id="a7" type="number" step="10"></td>
          </tr>
          <tr>
            <td>Strategic growth initiative (Lorch Connect / cobot pilots)</td>
            <td>Management suggests adding back pilot customer demos, software prototyping, and go-to-market work for Lorch Connect: <b>EUR k 280</b>. It sounds like future growth spend, but assess whether it is truly non-recurring or part of the ongoing strategy needed to deliver the business plan.</td>
            <td class="nr"><input class="cinp" id="a8" type="number" step="10"></td>
          </tr>'''
              text = replace_once(text, old_erp_row, new_erp_row, 'new EBITDA item')

              old_questions = '''      <div style="margin-top:14px">
        <label class="lbl">Explain your decision on item 1 (geopolitical event) – adjust or not?</label>
        <textarea class="inp" id="t_a1" placeholder="Methodological rationale..."></textarea>
        <label class="lbl">Explain your decision on item 3 (trade fair investment) – adjust or not?</label>
        <textarea class="inp" id="t_a6r" placeholder="Methodological rationale..."></textarea>
        <label class="lbl">Explain your decision on item 2 (management compensation) – adjust or not?</label>
        <textarea class="inp" id="t_a5" placeholder="Methodological rationale..."></textarea>
        <label class="lbl">Explain your decision on item 4 (ERP implementation) – adjust or not?</label>
        <textarea class="inp" id="t_a7" placeholder="Methodological rationale..."></textarea>
      </div>'''
              new_questions = '''      <div style="margin-top:14px">
        <label class="lbl">Explain your decision on item 1 (geopolitical event) – adjust or not?</label>
        <textarea class="inp" id="t_a1" placeholder="Methodological rationale..."></textarea>
        <label class="lbl">Explain your decision on item 2 (management compensation) – adjust or not?</label>
        <textarea class="inp" id="t_a5" placeholder="Methodological rationale..."></textarea>
        <label class="lbl">Explain your decision on item 3 (trade fair investment) – adjust or not?</label>
        <textarea class="inp" id="t_a6r" placeholder="Methodological rationale..."></textarea>
        <label class="lbl">Explain your decision on item 4 (ERP implementation) – adjust or not?</label>
        <textarea class="inp" id="t_a7" placeholder="Methodological rationale..."></textarea>
        <label class="lbl">Explain your decision on item 5 (Lorch Connect / cobot pilots) – adjust or not?</label>
        <textarea class="inp" id="t_a8" placeholder="Methodological rationale..."></textarea>
      </div>'''
              text = replace_once(text, old_questions, new_questions, 'question order and item 5 rationale')

              text = replace_once(text, 'placeholder="e.g., 4100"', 'placeholder="e.g., 3480"', 'adjusted EBITDA placeholder')
              text = replace_once(text, 'let cur=0,tid=null,sl=5400;', 'const DEFAULT_TIMER_SECONDS=3600;\nlet cur=0,tid=null,sl=DEFAULT_TIMER_SECONDS;', 'timer default constant')
              text = replace_once(text, "function resetT(){clearInterval(tid);tid=null;sl=5400;const el=document.getElementById('tmr');el.textContent='90:00';el.classList.remove('warn');}", "function resetT(){clearInterval(tid);tid=null;sl=DEFAULT_TIMER_SECONDS;const el=document.getElementById('tmr');el.textContent='60:00';el.classList.remove('warn');}", 'timer reset')
              text = replace_once(text, "const b=2541,adjs=['a1','a5','a6','a7'].map(id=>parseFloat(document.getElementById(id).value)||0);", "const b=2541,adjs=['a1','a5','a6','a7','a8'].map(id=>parseFloat(document.getElementById(id).value)||0);", 'calcE adjustment ids')
              text = replace_once(text, "const adjMap=[['a1','Geopolitical event'],['a5','Owner-manager comp. normalization'],['a6','Trade fair investment'],['a7','ERP implementation']];", "const adjMap=[['a1','Geopolitical event'],['a5','Owner-manager comp. normalization'],['a6','Trade fair investment'],['a7','ERP implementation'],['a8','Lorch Connect / cobot pilots']];", 'summary adjustment map')
              text = replace_once(text, 'if(Number.isFinite(state.sl))sl=state.sl;', 'if(Number.isFinite(state.sl))sl=Math.min(state.sl,DEFAULT_TIMER_SECONDS);', 'timer state clamp')
              text = replace_once(text, 'if(sl<5400){', 'if(sl<DEFAULT_TIMER_SECONDS){', 'timer display restore')

              path.write_text(text, encoding='utf-8')

          def patch_moderator():
              path = Path('moderator-solution.html')
              text = path.read_text(encoding='utf-8')

              text = replace_once(text, '<div class="kvbox"><div class="k">Total Adjustments</div><div class="v">+ TEUR 942</div><div class="sub">4 items, all one-off</div></div>', '<div class="kvbox"><div class="k">Total Adjustments</div><div class="v">+ TEUR 942</div><div class="sub">4 adjusted / 5 reviewed</div></div>', 'moderator total adjustment sublabel')
              text = replace_once(text, '<tr class="adj"><td>4) ERP implementation (SAP S/4HANA)</td><td class="nr">+192</td><td><b>Yes – full</b></td><td>Project completed, non-recurring, now in steady-state maintenance (already budgeted separately). Full one-off adjustment per DVFA.</td></tr>', '<tr class="adj"><td>4) ERP implementation (SAP S/4HANA)</td><td class="nr">+192</td><td><b>Yes – full</b></td><td>Project completed, non-recurring, now in steady-state maintenance (already budgeted separately). Full one-off adjustment per DVFA.</td></tr>\n          <tr class="ex"><td>5) Lorch Connect / cobot pilot spend</td><td class="nr">0</td><td><b>No</b></td><td>Sounds attractive because it supports future growth, but it is operating investment required to deliver the business plan. It is neither clearly non-recurring nor non-operating, so it should not be added back to EBITDA.</td></tr>', 'moderator item 5 row')
              text = replace_once(text, '<tr class="hl sub"><td><b>= Adj. EBITDA</b></td><td class="nr"><b>3,483</b></td><td colspan="2">TEUR 3,483 consensus basis (range: 3,200–4,036 depending on trade fair treatment)</td></tr>', '<tr class="hl sub"><td><b>= Adj. EBITDA</b></td><td class="nr"><b>3,483</b></td><td colspan="2">TEUR 3,483 consensus basis (item 5 = no adjustment; range: 3,200–4,036 depending on trade fair treatment)</td></tr>', 'moderator subtotal note')
              text = replace_once(text, '<b>Discussion note:</b> Some groups may arrive at ~TEUR 4,036 if they add the full trade fair amount plus a separate management bonus normalization. The spread in student results is pedagogically valuable — discuss what methodological choices drove each group\'s number.', '<b>Discussion note:</b> Some groups may arrive at ~TEUR 4,036 if they add the full trade fair amount plus a separate management bonus normalization. The spread in student results is pedagogically valuable — discuss what methodological choices drove each group\'s number. If groups add back the Lorch Connect / cobot pilot spend, use it as a debrief point: a good growth story is not enough for an EBITDA adjustment.', 'moderator discussion note')
              text = replace_once(text, 'Documenting the TEUR 942 adjustment with third-party evidence transforms EBITDA from TEUR 2,541 to TEUR 3,483: that alone at 11.5× = TEUR 10.8M of additional equity value.', 'Documenting the TEUR 942 valid adjustment with third-party evidence, while rejecting the non-adjustable Lorch Connect growth spend, transforms EBITDA from TEUR 2,541 to TEUR 3,483: that alone at 11.5× = TEUR 10.8M of additional equity value.', 'moderator QoE paragraph')
              text = replace_once(text, '<li><b>Quality of Earnings (QoE) documentation</b> — Commission a Big-4 or specialist M&A QoE report confirming all EBITDA adjustments with third-party evidence. Directly translates into a higher defensible EBITDA and reduces buyer risk discount on the multiple.</li>', '<li><b>Quality of Earnings (QoE) documentation</b> — Commission a Big-4 or specialist M&A QoE report confirming the valid EBITDA adjustments and explicitly rejecting non-adjustable growth spend. Directly translates into a higher defensible EBITDA and reduces buyer risk discount on the multiple.</li>', 'moderator QoE measure')

              path.write_text(text, encoding='utf-8')

          def patch_student_presentation():
              path = Path('student-presentation.html')
              text = path.read_text(encoding='utf-8')

              text = replace_once(text, "const a1=num(d,'a1')||0, a5=num(d,'a5')||0, a6=num(d,'a6')||0, a7=num(d,'a7')||0;", "const a1=num(d,'a1')||0, a5=num(d,'a5')||0, a6=num(d,'a6')||0, a7=num(d,'a7')||0, a8=num(d,'a8')||0;", 'presentation adjustment vars')
              text = replace_once(text, "const adjEBITDA = num(d,'fin_e') || (2541+a1+a5+a6+a7);", "const adjEBITDA = num(d,'fin_e') || (2541+a1+a5+a6+a7+a8);", 'presentation fallback adjusted EBITDA')
              text = replace_once(text, '<div class="kvbox"><div class="k">Total Adjustments</div><div class="v">+ TEUR ${fmt(a1+a5+a6+a7)}</div><div class="sub">4 items</div></div>', '<div class="kvbox"><div class="k">Total Adjustments</div><div class="v">+ TEUR ${fmt(a1+a5+a6+a7+a8)}</div><div class="sub">5 items reviewed</div></div>', 'presentation total adjustments')
              text = replace_once(text, "          <tr><td>4) ERP implementation (SAP S/4HANA)</td><td class=\"nr\">${a7?'+'+fmt(a7):'—'}</td><td>${val(d,'t_a7','No rationale entered.')}</td></tr>", "          <tr><td>4) ERP implementation (SAP S/4HANA)</td><td class=\"nr\">${a7?'+'+fmt(a7):'—'}</td><td>${val(d,'t_a7','No rationale entered.')}</td></tr>\n          <tr><td>5) Lorch Connect / cobot pilot spend</td><td class=\"nr\">${a8?'+'+fmt(a8):'—'}</td><td>${val(d,'t_a8','No rationale entered.')}</td></tr>", 'presentation item 5 row')

              path.write_text(text, encoding='utf-8')

          patch_index()
          patch_moderator()
          patch_student_presentation()

          workflow = Path('.github/workflows/codex-module2-ebitda-timer-update.yml')
          if workflow.exists():
              workflow.unlink()
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html moderator-solution.html student-presentation.html .github/workflows/codex-module2-ebitda-timer-update.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update Module 2 EBITDA adjustments and timer"
          git push origin HEAD:codex/module2-ebitda-timer-update
